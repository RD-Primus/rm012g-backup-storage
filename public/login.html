<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — RM-012-G Downloader</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Login-specific overrides */
    body {
      align-items: center;
      justify-content: center;
      display: flex;
      flex-direction: column;
      overflow: auto;
    }

    .login-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, .45);
      backdrop-filter: blur(16px);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .login-logo .icon {
      font-size: 36px;
    }

    .login-logo h1 {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(to right, #a855f7, #ec4899);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-top: 6px;
    }

    .login-logo p {
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
    }

    .login-subtitle {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 22px;
      line-height: 1.5;
    }

    .setup-badge {
      background: rgba(99, 102, 241, .15);
      color: var(--primary);
      border: 1px solid rgba(99, 102, 241, .3);
      border-radius: 7px;
      padding: 7px 12px;
      font-size: 12px;
      text-align: center;
      margin-bottom: 20px;
    }

    .login-card .btn {
      margin-top: 6px;
      font-size: 14px;
      padding: 12px;
    }

    .login-error {
      color: var(--danger);
      font-size: 12px;
      text-align: center;
      margin-top: 10px;
      min-height: 18px;
    }

    .pw-row {
      position: relative;
      display: flex;
      flex-direction: column;
      /* stack label above input like other .input-group */
    }

    .pw-row .pw-input-wrap {
      position: relative;
      /* contains input + button */
      display: flex;
      align-items: center;
    }

    .pw-row input {
      flex: 1;
      width: 100%;
      padding-right: 40px;
      /* room for the eye button */
    }

    .pw-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 16px;
      padding: 4px;
      line-height: 1;
    }
  </style>
</head>

<body>

  <div class="login-card" id="loginCard">
    <div class="login-logo">
      <div class="icon">⬇</div>
      <h1>RM-012-G Downloader</h1>
      <p>Secure SFTP sync manager</p>
    </div>

    <!-- Shown when hasUsers is false -->
    <div id="setupSection" class="hidden">
      <div class="setup-badge">🎉 Welcome! Create your first admin account</div>
    </div>

    <p class="login-subtitle" id="loginSubtitle">Sign in to continue</p>

    <form id="loginForm" autocomplete="off">
      <div class="input-group">
        <label for="lu">Username</label>
        <input type="text" id="lu" autocomplete="username" placeholder="Enter username" required>
      </div>
      <div class="input-group pw-row">
        <label for="lp">Password</label>
        <div class="pw-input-wrap">
          <input type="password" id="lp" autocomplete="current-password" placeholder="Enter password" required>
          <button type="button" class="pw-toggle" id="pwToggle" title="Show/hide password">
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-save" id="loginBtn">Sign In</button>
      <div class="login-error" id="loginError"></div>
    </form>
  </div>

  <script>
    // ── Theme ─────────────────────────────────────────────────
    (function () {
      const t = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();

    // ── Toggle password visibility ───────────────────────────
    document.getElementById('pwToggle').addEventListener('click', () => {
      const inp = document.getElementById('lp');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    });

    // ── Detect first-run ─────────────────────────────────────
    (async function init() {
      const res = await fetch('/api/auth/status');
      const data = await res.json();

      if (!data.hasUsers) {
        document.getElementById('setupSection').classList.remove('hidden');
        document.getElementById('loginSubtitle').textContent = 'Create a username and password';
        document.getElementById('loginBtn').textContent = 'Create Account';
      }
    })();

    // ── Form submit ──────────────────────────────────────────
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('lu').value.trim();
      const password = document.getElementById('lp').value;
      const errEl = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');

      errEl.textContent = '';
      btn.disabled = true;
      btn.textContent = '⏳ Please wait…';

      const endpoint = document.getElementById('setupSection').classList.contains('hidden')
        ? '/api/auth/login'
        : '/api/auth/setup';

      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (data.success && data.token) {
          localStorage.setItem('authToken', data.token);
          window.location.replace('/');
        } else {
          errEl.textContent = data.message || 'An error occurred.';
        }
      } catch {
        errEl.textContent = 'Network error. Is the server running?';
      } finally {
        btn.disabled = false;
        btn.textContent = document.getElementById('setupSection').classList.contains('hidden')
          ? 'Sign In' : 'Create Account';
      }
    });
  </script>
</body>

</html>
