<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RM-012-G Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ── App Header ─────────────────────────────────────── -->
    <header class="app-header">
        <div class="app-header__brand">
            <span class="app-header__icon">⬇</span>
            <div>
                <h1>RM-012-G Downloader</h1>
                <p>Multi-client sync manager</p>
            </div>
        </div>
        <div class="app-header__actions">
            <span id="currentUser" class="current-user"></span>
            <button id="logoutBtn" class="btn-logout" title="Logout">⏏</button>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙 Dark</button>
        </div>
    </header>

    <!-- ── App Body ───────────────────────────────────────── -->
    <div class="app-body">

        <!-- Aside: Client list + actions -->
        <aside class="app-aside">
            <div class="aside-scroll">
                <div id="clientList"></div>
                <div class="add-client-section">
                    <button class="btn btn-add" id="addClientBtn">＋ Add Client</button>
                </div>
            </div>
        </aside>

        <!-- Main: Terminal log -->
        <main class="app-main">
            <div class="terminal-wrapper">
                <div class="terminal-header">
                    <span class="dot red"></span>
                    <span class="dot yellow"></span>
                    <span class="dot green"></span>
                    <span class="title">System Logs</span>
                </div>
                <pre id="logTerminal" class="log-terminal"></pre>
            </div>
        </main>

    </div>

    <!-- ── Modal: Add / Edit Client ───────────────────────── -->
    <div id="clientModal" class="modal hidden">
        <div class="modal-box">
            <h2 id="modalTitle">Add Client</h2>
            <form id="clientForm">
                <input type="hidden" id="clientId">
                <div class="input-group">
                    <label for="clientLabel">Label</label>
                    <input type="text" id="clientLabel" placeholder="e.g. Pi Living Room" required>
                </div>
                <div class="input-group">
                    <label for="clientHost">IP Address</label>
                    <input type="text" id="clientHost" placeholder="e.g. 10.222.1.3" required>
                </div>
                <div class="input-group">
                    <label for="clientLocalDir">Local Save Directory</label>
                    <input type="text" id="clientLocalDir" placeholder="e.g. data or d:\myfolder" required>
                </div>
                <div class="input-group">
                    <label for="clientInterval">Interval: <span id="intervalLabel">10</span> min</label>
                    <input type="range" id="clientInterval" min="1" max="60" value="10">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-ghost" id="cancelModal">Cancel</button>
                    <button type="submit" class="btn btn-save">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
